<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #7c6cfc;
    --accent2: #fc6cc8;
    --accent3: #6cfcca;
    --text: #e8e8f0;
    --text-muted: #6a6a8a;
    --user-bg: #1e1a3a;
    --ai-bg: #111118;
    --danger: #fc6c6c;
    --success: #6cfca8;
    --font-mono: 'Space Mono', monospace;
    --font-sans: 'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    overflow: hidden;
  }

  /* Noise grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* Ambient glow */
  body::after {
    content: '';
    position: fixed;
    top: -30%;
    left: -20%;
    width: 60%;
    height: 60%;
    background: radial-gradient(ellipse, rgba(124,108,252,0.08) 0%, transparent 70%);
    pointer-events: none;
    animation: drift 12s ease-in-out infinite alternate;
  }

  @keyframes drift {
    from { transform: translate(0, 0); }
    to { transform: translate(10%, 15%); }
  }

  /* ─── Layout ─────────────────────────────── */
  #app {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    max-width: 900px;
    margin: 0 auto;
    position: relative;
  }

  /* ─── Header ─────────────────────────────── */
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(12px);
    position: relative;
    z-index: 10;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 20px rgba(124,108,252,0.4);
    animation: pulse-logo 3s ease-in-out infinite;
  }

  @keyframes pulse-logo {
    0%, 100% { box-shadow: 0 0 20px rgba(124,108,252,0.4); }
    50% { box-shadow: 0 0 35px rgba(124,108,252,0.7), 0 0 60px rgba(252,108,200,0.2); }
  }

  .logo h1 {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo span {
    font-size: 0.7rem;
    color: var(--text-muted);
    font-family: var(--font-mono);
    display: block;
    margin-top: -2px;
  }

  #clear-btn {
    padding: 6px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  #clear-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,108,252,0.08);
  }

  /* ─── Chat Area ──────────────────────────── */
  #chat-area {
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  #chat-area::-webkit-scrollbar { width: 4px; }
  #chat-area::-webkit-scrollbar-track { background: transparent; }
  #chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Welcome screen */
  #welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 16px;
    padding: 60px 20px;
    text-align: center;
    animation: fade-in 0.6s ease;
  }

  #welcome .big-icon {
    font-size: 4rem;
    filter: drop-shadow(0 0 20px rgba(124,108,252,0.5));
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  #welcome h2 {
    font-size: 1.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--text), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #welcome p {
    color: var(--text-muted);
    font-size: 0.9rem;
    max-width: 380px;
    line-height: 1.7;
    font-family: var(--font-mono);
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }

  .suggestion-chip {
    padding: 8px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 0.8rem;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--font-mono);
  }

  .suggestion-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,108,252,0.1);
    transform: translateY(-2px);
  }

  /* Message bubbles */
  .msg {
    display: flex;
    gap: 12px;
    animation: msg-in 0.3s cubic-bezier(0.34,1.4,0.64,1);
    max-width: 100%;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 4px;
  }

  .msg.user .avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }

  .msg.ai .avatar {
    background: linear-gradient(135deg, #1a1a2e, var(--surface2));
    border: 1px solid var(--border);
  }

  .bubble {
    max-width: 75%;
    padding: 14px 16px;
    border-radius: 16px;
    line-height: 1.7;
    font-size: 0.9rem;
    position: relative;
  }

  .msg.user .bubble {
    background: var(--user-bg);
    border: 1px solid rgba(124,108,252,0.25);
    border-top-right-radius: 4px;
    color: var(--text);
  }

  .msg.ai .bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  /* Markdown-ish styles inside bubbles */
  .bubble pre {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    overflow-x: auto;
    margin: 10px 0;
    font-family: var(--font-mono);
    font-size: 0.8rem;
  }

  .bubble code {
    font-family: var(--font-mono);
    background: rgba(124,108,252,0.15);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.82em;
    color: var(--accent3);
  }

  .bubble pre code {
    background: none;
    padding: 0;
    color: var(--accent3);
  }

  .bubble strong { color: var(--accent2); }
  .bubble em { color: var(--accent3); font-style: italic; }

  .bubble h1, .bubble h2, .bubble h3 {
    margin: 12px 0 6px;
    color: var(--accent);
    font-family: var(--font-sans);
  }

  .bubble ul, .bubble ol {
    margin: 8px 0;
    padding-left: 20px;
  }

  .bubble li { margin: 4px 0; }

  .bubble p { margin: 6px 0; }
  .bubble p:first-child { margin-top: 0; }
  .bubble p:last-child { margin-bottom: 0; }

  /* File previews in messages */
  .file-previews {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }

  .file-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: rgba(124,108,252,0.12);
    border: 1px solid rgba(124,108,252,0.2);
    border-radius: 8px;
    font-size: 0.75rem;
    font-family: var(--font-mono);
    color: var(--accent);
    max-width: 180px;
  }

  .file-chip span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .img-preview {
    max-width: 200px;
    max-height: 150px;
    border-radius: 10px;
    border: 1px solid var(--border);
    object-fit: cover;
  }

  /* Typing indicator */
  #typing {
    display: none;
    align-items: center;
    gap: 12px;
    animation: msg-in 0.3s ease;
  }

  #typing.visible { display: flex; }

  .typing-dots {
    display: flex;
    gap: 5px;
    padding: 14px 18px;
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-top-left-radius: 4px;
  }

  .typing-dots span {
    width: 7px;
    height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
    opacity: 0.6;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ─── File Upload Zone ────────────────────── */
  #file-preview-bar {
    display: none;
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  #file-preview-bar.visible { display: flex; }

  .preview-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.75rem;
    font-family: var(--font-mono);
    color: var(--text-muted);
    position: relative;
    animation: chip-in 0.2s cubic-bezier(0.34,1.4,0.64,1);
  }

  @keyframes chip-in {
    from { opacity: 0; transform: scale(0.7); }
    to { opacity: 1; transform: scale(1); }
  }

  .preview-item .remove-file {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 0;
    font-size: 14px;
    line-height: 1;
    margin-left: 2px;
    transition: color 0.15s;
  }

  .preview-item .remove-file:hover { color: var(--danger); }

  /* ─── Input Area ─────────────────────────── */
  #input-area {
    padding: 16px 20px 20px;
    border-top: 1px solid var(--border);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(12px);
  }

  .input-box {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 12px;
    transition: border-color 0.2s;
    position: relative;
  }

  .input-box:focus-within {
    border-color: rgba(124,108,252,0.5);
    box-shadow: 0 0 0 3px rgba(124,108,252,0.08);
  }

  /* Drop zone highlight */
  .input-box.dragging {
    border-color: var(--accent);
    background: rgba(124,108,252,0.08);
    box-shadow: 0 0 0 3px rgba(124,108,252,0.15), inset 0 0 30px rgba(124,108,252,0.05);
  }

  .input-box.dragging::after {
    content: '📂 วางไฟล์ที่นี่';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    color: var(--accent);
    font-family: var(--font-mono);
    background: rgba(10,10,15,0.7);
    border-radius: 15px;
    backdrop-filter: blur(4px);
  }

  #upload-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 6px;
    border-radius: 8px;
    font-size: 18px;
    transition: all 0.2s;
    flex-shrink: 0;
    line-height: 1;
    display: flex;
    align-items: center;
  }

  #upload-btn:hover { color: var(--accent); background: rgba(124,108,252,0.1); }
  #file-input { display: none; }

  #message-input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 0.9rem;
    resize: none;
    outline: none;
    max-height: 150px;
    min-height: 24px;
    line-height: 1.6;
    padding: 4px 0;
  }

  #message-input::placeholder { color: var(--text-muted); }

  #send-btn {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 16px;
  }

  #send-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 4px 20px rgba(124,108,252,0.4);
  }

  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .input-hint {
    text-align: center;
    font-size: 0.68rem;
    color: var(--text-muted);
    font-family: var(--font-mono);
    margin-top: 10px;
  }

  .input-hint kbd {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 0.68rem;
  }

  /* Error toast */
  #toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(252, 108, 108, 0.15);
    border: 1px solid var(--danger);
    color: var(--danger);
    padding: 10px 20px;
    border-radius: 100px;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 100;
    max-width: 80vw;
    text-align: center;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @keyframes fade-in {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    #app { max-width: 100%; }
    .bubble { max-width: 88%; font-size: 0.85rem; }
    header { padding: 12px 16px; }
    #chat-area { padding: 16px 12px; }
    #input-area { padding: 12px 12px 16px; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-icon">✦</div>
      <div>
        <h1>AI Chat</h1>
        <span id="model-tag">openrouter · free</span>
      </div>
    </div>
    <button id="clear-btn" onclick="clearChat()">ล้างแชท</button>
  </header>

  <div id="chat-area">
    <div id="welcome">
      <div class="big-icon">✦</div>
      <h2>สวัสดีครับ!</h2>
      <p>ถามอะไรก็ได้ หรืออัพโหลดไฟล์เพื่อวิเคราะห์<br>รองรับ รูปภาพ · PDF · โค้ด · ข้อความ</p>
      <div class="suggestions">
        <div class="suggestion-chip" onclick="sendSuggestion('สรุปให้หน่อย')">📋 สรุปให้หน่อย</div>
        <div class="suggestion-chip" onclick="sendSuggestion('ช่วย debug โค้ดนี้')">🐛 Debug โค้ด</div>
        <div class="suggestion-chip" onclick="sendSuggestion('แปลเป็นภาษาไทย')">🌏 แปลภาษา</div>
        <div class="suggestion-chip" onclick="sendSuggestion('อธิบายให้เข้าใจง่าย')">💡 อธิบาย</div>
      </div>
    </div>

    <div id="typing">
      <div class="avatar">✦</div>
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div id="file-preview-bar"></div>

  <div id="input-area">
    <div class="input-box" id="input-box">
      <button id="upload-btn" onclick="document.getElementById('file-input').click()" title="อัพโหลดไฟล์">
        📎
      </button>
      <input type="file" id="file-input" multiple accept="image/*,.pdf,.txt,.csv,.json,.js,.ts,.py,.java,.html,.css,.md" onchange="handleFiles(this.files)">
      <textarea id="message-input" placeholder="พิมข้อความ... หรือลากไฟล์มาวาง" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()">▶</button>
    </div>
    <div class="input-hint">
      <kbd>Enter</kbd> ส่ง · <kbd>Shift+Enter</kbd> ขึ้นบรรทัดใหม่ · รองรับไฟล์สูงสุด 5 ไฟล์
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let history = [];
let pendingFiles = [];
let isLoading = false;

// ─── Drag & Drop ──────────────────────────────────────────────────────────────
const inputBox = document.getElementById('input-box');

inputBox.addEventListener('dragover', e => {
  e.preventDefault();
  inputBox.classList.add('dragging');
});

inputBox.addEventListener('dragleave', e => {
  if (!inputBox.contains(e.relatedTarget)) inputBox.classList.remove('dragging');
});

inputBox.addEventListener('drop', e => {
  e.preventDefault();
  inputBox.classList.remove('dragging');
  handleFiles(e.dataTransfer.files);
});

// Global drag prevention
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => e.preventDefault());

// ─── File Handling ────────────────────────────────────────────────────────────
function handleFiles(fileList) {
  const files = Array.from(fileList);
  const remaining = 5 - pendingFiles.length;
  if (remaining <= 0) { showToast('อัพโหลดได้สูงสุด 5 ไฟล์'); return; }
  const toAdd = files.slice(0, remaining);
  if (files.length > remaining) showToast(`เพิ่มได้อีก ${remaining} ไฟล์เท่านั้น`);
  pendingFiles = [...pendingFiles, ...toAdd];
  renderFilePreviews();
}

function renderFilePreviews() {
  const bar = document.getElementById('file-preview-bar');
  if (pendingFiles.length === 0) { bar.classList.remove('visible'); bar.innerHTML = ''; return; }
  bar.classList.add('visible');
  bar.innerHTML = pendingFiles.map((f, i) => `
    <div class="preview-item">
      ${getFileEmoji(f)} <span title="${f.name}">${f.name.length > 20 ? f.name.slice(0,18)+'…' : f.name}</span>
      <button class="remove-file" onclick="removeFile(${i})">×</button>
    </div>
  `).join('');
}

function removeFile(i) {
  pendingFiles.splice(i, 1);
  renderFilePreviews();
}

function getFileEmoji(f) {
  if (f.type.startsWith('image/')) return '🖼️';
  if (f.type === 'application/pdf') return '📄';
  if (f.name.endsWith('.py')) return '🐍';
  if (f.name.endsWith('.js') || f.name.endsWith('.ts')) return '⚡';
  if (f.name.endsWith('.json')) return '{}';
  return '📝';
}

// ─── Send ─────────────────────────────────────────────────────────────────────
async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('message-input');
  const text = input.value.trim();

  if (!text && pendingFiles.length === 0) return;

  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  const files = [...pendingFiles];
  const message = text;

  input.value = '';
  autoResize(input);
  pendingFiles = [];
  renderFilePreviews();

  // Hide welcome
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  // Show user message
  appendMessage('user', message, files);

  // Show typing
  showTyping(true);

  try {
    const formData = new FormData();
    if (message) formData.append('message', message);
    formData.append('history', JSON.stringify(history));
    files.forEach(f => formData.append('files', f));

    const res = await fetch('/api/chat', { method: 'POST', body: formData });
    const data = await res.json();

    if (!res.ok) throw new Error(data.error || 'เกิดข้อผิดพลาด');

    showTyping(false);
    appendMessage('ai', data.message);

    // Update model tag
    if (data.model) {
      const tag = document.getElementById('model-tag');
      if (tag) tag.textContent = data.model.replace(':free', ' · free');
    }

    // Update history (text only for next turn)
    history.push({ role: 'user', content: message || '[ไฟล์แนบ]' });
    history.push({ role: 'assistant', content: data.message });

    // Keep history reasonable
    if (history.length > 20) history = history.slice(-20);

  } catch (err) {
    showTyping(false);
    showToast(err.message);
    appendMessage('ai', `⚠️ ${err.message}`);
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('message-input').focus();
}

function sendSuggestion(text) {
  document.getElementById('message-input').value = text;
  sendMessage();
}

// ─── UI Helpers ───────────────────────────────────────────────────────────────
function appendMessage(role, text, files = []) {
  const area = document.getElementById('chat-area');
  const typing = document.getElementById('typing');

  const div = document.createElement('div');
  div.className = `msg ${role}`;

  // File chips
  let filePart = '';
  if (files.length > 0) {
    const chips = files.map(f => {
      if (f.type.startsWith('image/')) {
        const url = URL.createObjectURL(f);
        return `<img class="img-preview" src="${url}" alt="${f.name}">`;
      }
      return `<div class="file-chip">${getFileEmoji(f)} <span>${f.name}</span></div>`;
    }).join('');
    filePart = `<div class="file-previews">${chips}</div>`;
  }

  const textPart = text ? `<div>${markdownToHtml(text)}</div>` : '';
  const bubbleContent = filePart + textPart;

  const avatarEmoji = role === 'user' ? '👤' : '✦';

  div.innerHTML = `
    <div class="avatar">${avatarEmoji}</div>
    ${bubbleContent ? `<div class="bubble">${bubbleContent}</div>` : ''}
  `;

  area.insertBefore(div, typing);
  area.scrollTop = area.scrollHeight;
}

function showTyping(visible) {
  const t = document.getElementById('typing');
  const area = document.getElementById('chat-area');
  if (visible) {
    t.classList.add('visible');
    area.scrollTop = area.scrollHeight;
  } else {
    t.classList.remove('visible');
  }
}

function markdownToHtml(text) {
  // Code blocks first
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${escapeHtml(code.trim())}</code></pre>`);
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Headers
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Lists
  text = text.replace(/^\- (.+)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
  // Paragraphs
  text = text.split('\n\n').map(p => {
    if (p.startsWith('<')) return p;
    return `<p>${p.replace(/\n/g, '<br>')}</p>`;
  }).join('');
  return text;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

function clearChat() {
  history = [];
  const area = document.getElementById('chat-area');
  const typing = document.getElementById('typing');
  // Remove all messages except typing
  [...area.children].forEach(c => { if (c !== typing) c.remove(); });
  // Re-add welcome
  const welcome = document.createElement('div');
  welcome.id = 'welcome';
  welcome.innerHTML = `
    <div class="big-icon">✦</div>
    <h2>สวัสดีครับ!</h2>
    <p>ถามอะไรก็ได้ หรืออัพโหลดไฟล์เพื่อวิเคราะห์<br>รองรับ รูปภาพ · PDF · โค้ด · ข้อความ</p>
    <div class="suggestions">
      <div class="suggestion-chip" onclick="sendSuggestion('สรุปให้หน่อย')">📋 สรุปให้หน่อย</div>
      <div class="suggestion-chip" onclick="sendSuggestion('ช่วย debug โค้ดนี้')">🐛 Debug โค้ด</div>
      <div class="suggestion-chip" onclick="sendSuggestion('แปลเป็นภาษาไทย')">🌏 แปลภาษา</div>
      <div class="suggestion-chip" onclick="sendSuggestion('อธิบายให้เข้าใจง่าย')">💡 อธิบาย</div>
    </div>
  `;
  area.insertBefore(welcome, typing);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 150) + 'px';
}

// Focus on load
document.getElementById('message-input').focus();
</script>
